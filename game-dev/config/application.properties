# game-dev 本地配置示例（GameConfigStarter 默认路径：工作目录下 config/application.properties）。
# 优先级：命令行 --key=value / -Dkey=value > JVM 系统属性 > 环境变量 > 本文件。
# 文件缺失时静默忽略；除 game.db.password 外所有键都有代码内默认值。

# ---- 服务器 ----
#game.server.port=8080
#game.server.address=127.0.0.1
#game.service.name=game-dev

# ---- MySQL ----
#game.db.url=jdbc:mysql://localhost:3306/test
#game.db.username=root
# 密码必填：写在这里、-Dgame.db.password 或环境变量 GAME_DB_PASSWORD
#game.db.password=

# ---- 注册中心 ----
# memory：进程内纯内存实现（默认，无外部依赖；endpoints 只当 namespace 用，可留空）
# zookeeper / etcd / nacos / consul：需引入对应 game-registry-* 模块并配置真实 endpoints
#game.registry.type=memory
#game.registry.endpoints=local
